@if (notificacao) {
  <div
    (click)="abrirConversa()"
    class="fixed top-20 left-1/2 -translate-x-1/2 z-[60] w-[calc(100%-2rem)] max-w-sm
           bg-surface-container-lowest rounded-2xl shadow-xl
           border border-outline-variant/20
           flex items-center gap-3 px-4 py-3 cursor-pointer
           active:scale-[0.98] transition-all duration-150"
    role="button"
    tabindex="0">

    <div class="w-11 h-11 rounded-full bg-primary-container flex items-center justify-center shrink-0">
      <span class="material-symbols-outlined text-on-primary-container"
            style="font-variation-settings: 'FILL' 1;">celebration</span>
    </div>

    <div class="flex-1 min-w-0">
      <p class="text-sm font-bold text-on-surface truncate">{{ notificacao.titulo }}</p>
      <p class="text-xs text-on-surface-variant mt-0.5 leading-tight">
        Toque aqui ou abra o chat para conversar
      </p>
    </div>

    <button
      (click)="fechar($event)"
      class="p-1.5 rounded-full text-on-surface-variant hover:bg-surface-container hover:text-on-surface
             transition-colors shrink-0">
      <span class="material-symbols-outlined text-lg">close</span>
    </button>
  </div>
}
