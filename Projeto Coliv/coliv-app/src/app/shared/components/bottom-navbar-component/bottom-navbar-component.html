<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-8 pt-4
  bg-surface-container-lowest/80 backdrop-blur-2xl z-50 rounded-t-[2.5rem]
  shadow-[0_-10px_40px_rgba(0,0,0,0.04)] border-t border-outline-variant/10">

  <!-- Início / Feed -->
  <a [routerLink]="feedLink"
     routerLinkActive="nav-tab--active"
     [routerLinkActiveOptions]="{ exact: false }"
     class="nav-tab flex flex-col items-center gap-1 px-5 py-2
            text-on-surface-variant hover:text-primary
            transition-all active:scale-90 duration-300 rounded-2xl">
    <span class="material-symbols-outlined">home</span>
    <span class="text-[10px] font-bold uppercase tracking-widest">Início</span>
  </a>

  <!-- Chat -->
  <a routerLink="/chats"
     routerLinkActive="nav-tab--active"
     [routerLinkActiveOptions]="{ exact: false }"
     class="nav-tab flex flex-col items-center gap-1 px-5 py-2
            text-on-surface-variant hover:text-primary
            transition-all active:scale-90 duration-300 rounded-2xl">
    <span class="material-symbols-outlined">chat</span>
    <span class="text-[10px] font-bold uppercase tracking-widest">Chat</span>
  </a>

  <!-- Gestão / Despesas -->
  <a routerLink="/despesas"
     routerLinkActive="nav-tab--active"
     [routerLinkActiveOptions]="{ exact: true }"
     class="nav-tab flex flex-col items-center gap-1 px-5 py-2
            text-on-surface-variant hover:text-primary
            transition-all active:scale-90 duration-300 rounded-2xl">
    <span class="material-symbols-outlined">account_balance_wallet</span>
    <span class="text-[10px] font-bold uppercase tracking-widest">Gestão</span>
  </a>

  <!-- Perfil -->
  <a routerLink="/perfil"
     routerLinkActive="nav-tab--active"
     [routerLinkActiveOptions]="{ exact: true }"
     class="nav-tab flex flex-col items-center gap-1 px-5 py-2
            text-on-surface-variant hover:text-primary
            transition-all active:scale-90 duration-300 rounded-2xl">
    <span *ngIf="!fotoPerfilUrl()" class="material-symbols-outlined">person</span>
    <img *ngIf="fotoPerfilUrl()" [src]="fotoPerfilUrl()!" alt="Foto"
         class="w-6 h-6 rounded-full object-cover ring-2 ring-primary/30"/>
    <span class="text-[10px] font-bold uppercase tracking-widest">Perfil</span>
  </a>

</nav>
