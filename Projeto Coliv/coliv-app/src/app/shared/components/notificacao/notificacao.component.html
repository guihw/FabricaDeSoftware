<div class="relative" data-notificacao>

  <button
    (click)="toggleDropdown()"
    class="relative flex items-center justify-center w-10 h-10 rounded-full
           text-on-surface-variant hover:text-primary hover:bg-primary/10
           transition-all duration-200">
    <span class="material-symbols-outlined text-2xl">notifications</span>
    @if (quantidade > 0) {
      <span class="absolute top-0.5 right-0.5 min-w-[18px] h-[18px] px-1
                   bg-error text-on-error text-[10px] font-bold rounded-full
                   flex items-center justify-center leading-none">
        {{ quantidade > 9 ? '9+' : quantidade }}
      </span>
    }
  </button>

  @if (aberto) {
    <div class="absolute right-0 top-12 w-80 max-h-96 overflow-y-auto
                bg-surface-container rounded-2xl shadow-xl
                border border-outline-variant/20 z-50">

      <div class="flex items-center justify-between px-4 py-3 border-b border-outline-variant/20">
        <span class="text-sm font-semibold text-on-surface">Notificações</span>
        @if (quantidade > 0) {
          <button
            (click)="marcarTodasLidas()"
            class="text-xs text-primary hover:underline">
            Marcar todas como lidas
          </button>
        }
      </div>

      @if (naoLidas.length === 0) {
        <div class="flex flex-col items-center gap-2 py-8 text-on-surface-variant">
          <span class="material-symbols-outlined text-4xl opacity-40">notifications_off</span>
          <span class="text-sm">Nenhuma notificação</span>
        </div>
      }

      @for (n of naoLidas; track n.id) {
        <button
          (click)="clicarNotificacao(n)"
          class="w-full flex items-start gap-3 px-4 py-3
                 hover:bg-primary/5 transition-colors duration-150
                 border-b border-outline-variant/10 last:border-0 text-left">
          <span class="material-symbols-outlined text-xl text-primary mt-0.5 shrink-0">
            circle_notifications
          </span>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-on-surface truncate">{{ n.titulo }}</p>
            <p class="text-xs text-on-surface-variant mt-0.5 line-clamp-2">{{ n.mensagem }}</p>
          </div>
          <span class="text-[10px] text-on-surface-variant shrink-0 mt-1">
            {{ formatarTempo(n.criadoEm) }}
          </span>
        </button>
      }

    </div>
  }

</div>
