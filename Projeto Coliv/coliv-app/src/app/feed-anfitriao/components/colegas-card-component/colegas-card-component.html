<div class="group bg-surface-container-lowest rounded-xl p-4 shadow-[0_10px_30px_rgba(0,0,0,0.03)] hover:shadow-[0_20px_60px_rgba(0,0,0,0.06)] transition-all duration-500 flex flex-col">

  <!-- Avatar + badge de score -->
  <div class="relative rounded-xl overflow-hidden mb-5 aspect-[4/5] bg-gradient-to-br from-primary-container to-surface-container-high flex items-center justify-center flex-shrink-0">

    <!-- Avatar com iniciais -->
    <div class="w-24 h-24 rounded-full bg-primary/20 flex items-center justify-center">
      <span class="font-headline font-extrabold text-3xl text-primary">{{ iniciais }}</span>
    </div>

    <!-- Badge de score -->
    <div class="absolute top-4 right-4 px-3 py-1 rounded-full flex items-center gap-1 shadow-md"
      [ngClass]="corScore">
      <span class="font-black text-sm">{{ score }}%</span>
      <span class="text-[8px] font-bold uppercase tracking-tighter">Match</span>
    </div>
  </div>

  <!-- Dados do colega -->
  <div class="px-2 flex flex-col gap-3 flex-grow">

    <!-- Nome + email -->
    <div class="flex justify-between items-start">
      <h3 class="text-xl font-bold text-primary line-clamp-1">{{ recomendacao.nome }}</h3>
    </div>

    <p class="text-on-surface-variant text-sm font-medium line-clamp-1">
      {{ recomendacao.email }}
    </p>

    <!-- Resumo de compatibilidade -->
    <div class="flex items-start gap-2 p-3 bg-surface-container-low rounded-xl mt-1">
      <span class="material-symbols-outlined text-sm text-secondary flex-shrink-0 mt-0.5"
        style="font-variation-settings: 'FILL' 1">psychology</span>
      <p class="text-xs text-on-surface-variant font-medium italic leading-relaxed">
        {{ resumo }}
      </p>
    </div>

    <!-- Ações -->
    <div class="flex gap-3 mt-auto pt-2">
      <button
        (click)="onRecusar()"
        class="flex-1 bg-surface-container-high py-3 rounded-xl flex items-center justify-center active:scale-95 transition-all hover:bg-error-container hover:text-on-error-container">
        <span class="material-symbols-outlined text-outline">close</span>
      </button>
      <button
        (click)="onAceitar()"
        class="flex-[3] bg-gradient-to-br from-primary to-primary-container text-white py-3 rounded-xl font-bold text-xs uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all">
        Aceitar
        <span class="material-symbols-outlined text-[16px]"
          style="font-variation-settings: 'FILL' 1">favorite</span>
      </button>
    </div>

  </div>
</div>
