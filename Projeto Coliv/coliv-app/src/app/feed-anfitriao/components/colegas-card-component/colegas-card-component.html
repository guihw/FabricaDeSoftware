<div class="group bg-surface-container-lowest rounded-xl p-4 shadow-[0_10px_30px_rgba(0,0,0,0.03)]
           hover:shadow-[0_20px_60px_rgba(0,0,0,0.06)] transition-all duration-300 ease-out
           flex flex-col cursor-pointer active:scale-[0.98]"
  [class.swipe-out-left]="direcaoSaida() === 'esquerda'"
  (click)="onCardClick()">

  <!-- Avatar + badge de score -->
  <div class="relative rounded-xl overflow-hidden mb-5 aspect-[4/5]
              bg-gradient-to-br from-primary-container to-surface-container-high
              flex items-center justify-center flex-shrink-0">

    <!-- Foto de perfil (quando disponível) -->
    <img *ngIf="recomendacao.fotoPerfil"
         [src]="recomendacao.fotoPerfil"
         alt="Foto de {{ recomendacao.nome }}"
         class="w-full h-full object-cover absolute inset-0" />

    <!-- Avatar com iniciais (fallback) -->
    <div *ngIf="!recomendacao.fotoPerfil"
         class="w-24 h-24 rounded-full bg-primary/20 flex items-center justify-center">
      <span class="font-headline font-extrabold text-3xl text-primary">{{ iniciais }}</span>
    </div>

    <!-- Badge de score -->
    <div class="absolute top-4 right-4 px-3 py-1 rounded-full flex items-center gap-1 shadow-md"
      [ngClass]="corScore">
      <span class="font-black text-sm">{{ score }}%</span>
      <span class="text-[8px] font-bold uppercase tracking-tighter">Compatível</span>
    </div>

    <!-- Badge de verificação de antecedentes -->
    <div *ngIf="verificado"
         class="absolute bottom-3 left-3 flex items-center gap-1
                bg-secondary-container text-on-secondary-container
                px-2 py-0.5 rounded-full shadow-sm">
      <span class="material-symbols-outlined text-[12px]"
            style="font-variation-settings: 'FILL' 1;">verified_user</span>
      <span class="text-[10px] font-bold">Verificado</span>
    </div>

    <!-- Hint de ver perfil — aparece no hover -->
    <div class="absolute inset-0 bg-primary/0 group-hover:bg-primary/8
                transition-colors duration-200 rounded-xl
                flex items-end justify-center pb-4">
      <div class="opacity-0 group-hover:opacity-100 transition-opacity duration-200
                  bg-surface/90 backdrop-blur-sm px-3 py-1.5 rounded-full
                  flex items-center gap-1.5">
        <span class="material-symbols-outlined text-sm text-primary">person_search</span>
        <span class="text-[11px] font-bold text-primary uppercase tracking-wider">Ver perfil</span>
      </div>
    </div>
  </div>

  <!-- Dados do colega -->
  <div class="px-2 flex flex-col gap-3 flex-grow">

    <div>
      <h3 class="text-xl font-bold text-primary line-clamp-1">{{ recomendacao.nome }}</h3>
    </div>

    <!-- Resumo de compatibilidade -->
    <div class="flex items-start gap-2 p-3 bg-surface-container-low rounded-xl mt-1">
      <span class="material-symbols-outlined text-sm text-secondary flex-shrink-0 mt-0.5"
        style="font-variation-settings: 'FILL' 1">psychology</span>
      <p class="text-xs text-on-surface-variant font-medium italic leading-relaxed">
        {{ resumo }}
      </p>
    </div>

    <!-- Ações — stopPropagation para não abrir o modal -->
    <div class="flex gap-3 mt-auto pt-2">
      <button
        (click)="onRecusar($event)"
        [disabled]="!!direcaoSaida()"
        class="flex-1 bg-surface-container-high py-3 rounded-xl flex items-center justify-center
               active:scale-95 transition-all hover:bg-error-container hover:text-on-error-container
               disabled:opacity-50">
        <span class="material-symbols-outlined text-outline">close</span>
      </button>
      <button
        (click)="onAceitar($event)"
        [disabled]="botaoDesabilitado"
        [class.bg-secondary-container]="interesse"
        [class.text-on-secondary-container]="interesse"
        [class.cursor-default]="interesse"
        [class.bg-gradient-to-br]="!interesse"
        [class.from-primary]="!interesse"
        [class.to-primary-container]="!interesse"
        [class.text-white]="!interesse"
        class="flex-[3] py-3 rounded-xl font-bold text-xs uppercase tracking-widest
               flex items-center justify-center gap-2 active:scale-95 transition-all
               disabled:opacity-50">
        <ng-container *ngIf="carregandoInteresse">
          <span class="material-symbols-outlined text-[16px] animate-spin">progress_activity</span>
          Aguarde...
        </ng-container>
        <ng-container *ngIf="!carregandoInteresse && !interesse">
          Tenho Interesse
          <span class="material-symbols-outlined text-[16px]"
            style="font-variation-settings: 'FILL' 1">handshake</span>
        </ng-container>
        <ng-container *ngIf="!carregandoInteresse && interesse">
          <span class="material-symbols-outlined text-[16px]"
            style="font-variation-settings: 'FILL' 1">check_circle</span>
          Interesse Enviado
        </ng-container>
      </button>
    </div>

  </div>
</div>
