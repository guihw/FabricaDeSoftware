<div class="login-container">
    <img src="logoColiv.png" alt="Logo" class="logo" />
  <div class="login-card">
    
    

    <h2>Entrar</h2>

    <form (ngSubmit)="onSubmit()">
      <input 
        type="email" 
        placeholder="E-mail"
        required
      />

      <input 
        type="password" 
        placeholder="Senha"
        required
        minlength="4"
      />

      <button type="submit">Entrar</button>
    </form>

    <div class="actions">
       <a class="link" (click)="esqueciSenha()">
    Esqueci minha senha
       </a>

  <a class="link" (click)="irParaCadastro()">
    Cadastrar
  </a>
    </div>

  </div>
</div>
