<!-- TopAppBar -->
<header class="sticky top-0 w-full z-50 bg-slate-50/70 dark:bg-slate-950/70 backdrop-blur-xl">
  <div class="flex items-center justify-between px-6 py-4 w-full">
    <div class="flex items-center gap-4">
      <button (click)="voltar()"
              class="active:scale-95 transition-all duration-200 text-[#1A2B4C] dark:text-slate-50">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>

      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-surface-container-high
                    flex items-center justify-center text-primary font-bold text-sm">
          {{ nomeOutro.charAt(0).toUpperCase() }}
        </div>
        <div>
          <h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-[#1A2B4C] dark:text-slate-50">
            {{ nomeOutro }}
          </h1>
          <p class="text-[10px] font-bold uppercase tracking-widest text-secondary">
            {{ isAnfitriao ? 'Colega' : 'Anfitrião Verificado' }}
          </p>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- Main Canvas -->
<main class="flex-grow w-full max-w-4xl mx-auto px-4 md:px-0 flex flex-col mb-32">

  <!-- Bloco de convite -->
  <div class="mt-4 mb-6 px-4 md:px-0 max-w-4xl mx-auto">
    <app-convite-action
      [matchId]="matchId"
      [isAnfitriao]="isAnfitriao"
      [anfitriaoId]="anfitriaoId"
      [colegaId]="colegaId"
      (conviteAtualizado)="onConviteAtualizado($event)">
    </app-convite-action>
  </div>

  <!-- Notificação inline quando status do convite muda -->
  <div *ngIf="notificacaoConvite" class="flex justify-center my-4">
    <div class="bg-secondary-container/20 border border-secondary-container/30 px-6 py-3
                rounded-2xl flex items-center gap-3 max-w-sm">
      <span class="material-symbols-outlined text-on-secondary-container">handshake</span>
      <p class="text-xs font-semibold text-on-secondary-container leading-tight">
        {{ notificacaoConvite }}
      </p>
    </div>
  </div>

  <!-- Área do chat -->
  <div class="flex-grow space-y-8 pb-12">

    <!-- Divider de tempo -->
    <div class="flex justify-center">
      <span class="bg-surface-container-high px-4 py-1 rounded-full
                   text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">
        Hoje
      </span>
    </div>

    <!-- Saudação automática do match -->
    <div class="flex flex-col items-center text-center max-w-md mx-auto space-y-3">
      <div class="w-12 h-12 bg-surface-container-low rounded-full flex items-center justify-center">
        <span class="material-symbols-outlined text-primary-container"
              style="font-variation-settings: 'FILL' 1;">celebration</span>
      </div>
      <p class="text-on-surface-variant text-sm font-medium">
        Você e {{ nomeOutro }} deram match! Comece uma conversa para alinhar os detalhes da moradia.
      </p>
    </div>

  </div>
</main>

<!-- Campo de mensagem fixo -->
<div class="fixed bottom-24 left-0 w-full px-6 md:px-0 flex justify-center z-40 pointer-events-none">
  <div class="w-full max-w-3xl bg-white/90 backdrop-blur-xl p-3 rounded-[2rem]
              shadow-2xl shadow-primary/10 flex items-center gap-3
              border border-slate-200/50 pointer-events-auto">
    <button class="w-12 h-12 flex items-center justify-center
                   text-on-surface-variant hover:text-primary transition-colors">
      <span class="material-symbols-outlined">add_circle</span>
    </button>
    <input class="flex-grow bg-surface-container-low border-none rounded-full px-6 py-3 text-sm
                  focus:ring-2 focus:ring-secondary/20 placeholder:text-on-surface-variant/40"
           placeholder="Escreva sua mensagem..."
           type="text"/>
    <button class="w-12 h-12 bg-primary text-white rounded-full flex items-center justify-center
                   active:scale-90 transition-transform">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
    </button>
  </div>
</div>

<app-navbar-bottom></app-navbar-bottom>
