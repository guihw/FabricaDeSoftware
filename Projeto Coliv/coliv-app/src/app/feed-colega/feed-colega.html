<app-top-navbar-component>
  <div class="flex items-center gap-4">
    <div class="p-2 rounded-full bg-surface-container-low active:scale-95 transition-all duration-200">
      <span class="material-symbols-outlined text-[#1A2B4C]">search</span>
    </div>
    <a routerLink="/perfil"
      class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center border-2 border-secondary-container overflow-hidden hover:ring-2 hover:ring-primary transition-all">
      <img *ngIf="fotoPerfilUrl()" [src]="fotoPerfilUrl()!" alt="Foto" class="w-full h-full object-cover"/>
      <span *ngIf="!fotoPerfilUrl()" class="material-symbols-outlined text-primary">person</span>
    </a>
  </div>
</app-top-navbar-component>

<main class="max-w-7xl mx-auto px-6 pt-8 pb-32">

  <!-- Hero -->
  <section class="mb-10 flex items-start justify-between gap-4 flex-wrap">
    <div>
      <h1 class="font-headline font-bold text-4xl tracking-tight text-on-surface mb-2">
        Encontre seu <span class="text-secondary">próximo santuário.</span>
      </h1>
      <p class="text-on-surface-variant font-medium">Curadoria exclusiva baseada no seu estilo de vida.</p>
    </div>

    <button (click)="abrirModalPlanoPlus()"
      class="flex items-center gap-2 px-5 py-3 bg-primary text-white rounded-xl font-bold text-sm active:scale-95 transition-all shrink-0">
      <span class="material-symbols-outlined text-base">workspace_premium</span>
      Plano Plus
    </button>
  </section>

  <!-- Estado: carregando -->
  <div *ngIf="carregando()" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    <div *ngFor="let i of [1,2,3]"
      class="bg-surface-container-low rounded-xl h-[520px] animate-pulse">
    </div>
  </div>

  <!-- Estado: erro -->
  <div *ngIf="!carregando() && erro()"
    class="flex flex-col items-center justify-center gap-4 py-24 text-center">
    <span class="material-symbols-outlined text-5xl text-error opacity-60">error_outline</span>
    <p class="text-on-surface-variant font-medium max-w-sm">{{ erro() }}</p>
    <button (click)="carregarPagina(0)"
      class="px-6 py-3 bg-primary text-white rounded-xl font-bold text-sm active:scale-95 transition-all">
      Tentar novamente
    </button>
  </div>

  <!-- Estado: sem resultados -->
  <div *ngIf="!carregando() && !erro() && recomendacoes().length === 0"
    class="flex flex-col items-center justify-center gap-4 py-24 text-center">
    <span class="material-symbols-outlined text-5xl text-outline opacity-60">search_off</span>
    <p class="font-headline font-bold text-xl text-on-surface">Nenhuma moradia encontrada</p>
    <p class="text-on-surface-variant text-sm max-w-sm">
      Tente ajustar suas preferências de localização ou faixa de preço para ampliar os resultados.
    </p>
  </div>

  <!-- Grid de recomendações -->
  <div *ngIf="!carregando() && !erro() && recomendacoes().length > 0"
  class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 items-stretch">
  <app-moradia-card-component
    *ngFor="let rec of recomendacoes()"
    [recomendacao]="rec"
    [curtido]="curtidos().has(rec.card.anfitriaoId)"
    (like)="onLike($event)"
    (verDetalhes)="abrirDetalhe($event)">
  </app-moradia-card-component>
</div>

  <!-- Paginação -->
  <div *ngIf="!carregando() && !erro() && recomendacoes().length > 0"
    class="flex items-center justify-center gap-4 mt-12">

    <button (click)="paginaAnterior()" [disabled]="pagina() === 0"
      class="flex items-center gap-2 px-5 py-3 rounded-xl font-bold text-sm transition-all active:scale-95"
      [class.bg-primary]="pagina() > 0"
      [class.text-white]="pagina() > 0"
      [class.bg-surface-container-high]="pagina() === 0"
      [class.text-outline]="pagina() === 0"
      [class.cursor-not-allowed]="pagina() === 0">
      <span class="material-symbols-outlined text-base">arrow_back</span>
      Anterior
    </button>

    <span class="text-sm text-on-surface-variant font-medium px-4">
      Página {{ pagina() + 1 }}
    </span>

    <button (click)="proximaPagina()" [disabled]="!temProxima()"
      class="flex items-center gap-2 px-5 py-3 rounded-xl font-bold text-sm transition-all active:scale-95"
      [class.bg-primary]="temProxima()"
      [class.text-white]="temProxima()"
      [class.bg-surface-container-high]="!temProxima()"
      [class.text-outline]="!temProxima()"
      [class.cursor-not-allowed]="!temProxima()">
      Próxima
      <span class="material-symbols-outlined text-base">arrow_forward</span>
    </button>

  </div>

</main>

<app-navbar-bottom></app-navbar-bottom>

<router-outlet></router-outlet>

<!-- Modal de detalhe da moradia -->
<app-moradia-detail-modal
  [recomendacao]="recomendacaoSelecionada"
  [aberto]="modalAberto"
  (fechar)="fecharDetalhe()"
  (interesse)="onLike($event)">
</app-moradia-detail-modal>

<!-- Modal do Plano Plus -->
<app-plano-plus-modal
  [aberto]="modalPlanoPlusAberto"
  (fechar)="fecharModalPlanoPlus()"
  (pagamentoConfirmado)="onPagamentoPlusConfirmado()">
</app-plano-plus-modal>
